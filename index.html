<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DM Express | Trucking & Logistics in Lincoln, CA</title>
    <meta
      name="description"
      content="DM Express is a Lincoln, CA trucking company offering dedicated lanes, driver and owner operator opportunities, parking, repairs, trailer rentals, and lease-to-own equipment."
    />
    <meta name="theme-color" content="#101418" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f5f1" media="(prefers-color-scheme: light)" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="%VITE_COMPANY_URL%/" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem("dm-theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="image"
      href="/assets/dm-express-hero-volvo.jpg"
      fetchpriority="high"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="DM Express | Trucking & Logistics in Lincoln, CA" />
    <meta
      property="og:description"
      content="Trusted trucking and logistics partner. Dedicated lanes, driver-first opportunities, parking, repairs, trailer rentals, and lease-to-own."
    />
    <meta property="og:url" content="%VITE_COMPANY_URL%/" />
    <meta property="og:image" content="%VITE_COMPANY_URL%/assets/dm-express-hero-volvo.jpg" />
    <meta property="og:image:alt" content="DM Express Volvo-style semi truck in a logistics yard" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DM Express | Trucking & Logistics in Lincoln, CA" />
    <meta
      name="twitter:description"
      content="Dedicated lanes, driver-first opportunities, parking, repairs, trailer rentals, and lease-to-own equipment."
    />
    <meta name="twitter:image" content="%VITE_COMPANY_URL%/assets/dm-express-hero-volvo.jpg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MovingCompany",
        "name": "DM Express",
        "url": "%VITE_COMPANY_URL%/",
        "image": "%VITE_COMPANY_URL%/assets/dm-express-hero-volvo.jpg",
        "telephone": "%VITE_COMPANY_PHONE_E164%",
        "email": "%VITE_COMPANY_EMAIL%",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Lincoln",
          "addressRegion": "CA",
          "addressCountry": "US"
        },
        "areaServed": {
          "@type": "AdministrativeArea",
          "name": "California and the contiguous United States"
        },
        "identifier": [
          { "@type": "PropertyValue", "name": "MC", "value": "%VITE_COMPANY_MC_NUM%" },
          { "@type": "PropertyValue", "name": "DOT", "value": "%VITE_COMPANY_DOT_NUM%" }
        ],
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
